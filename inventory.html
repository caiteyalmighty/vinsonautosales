<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Inventory | Vinson Auto Sales</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <nav class="bg-white shadow-md sticky top-0 z-50 p-4">
        <div class="max-w-7xl mx-auto flex flex-wrap gap-4 items-center justify-between">
            <h1 class="font-bold text-blue-800 text-xl uppercase">Vinson Inventory</h1>
            
            <div class="flex flex-wrap gap-2">
                <input type="text" id="searchBox" placeholder="Search make/model..." class="border p-2 rounded">
                
                <select id="priceSort" class="border p-2 rounded">
                    <option value="default">Sort by Price</option>
                    <option value="low">Low to High</option>
                    <option value="high">High to Low</option>
                </select>

                <select id="mileFilter" class="border p-2 rounded">
                    <option value="all">Any Mileage</option>
                    <option value="100000">Under 100k Miles</option>
                    <option value="150000">Under 150k Miles</option>
                </select>
            </div>
        </div>
    </nav>

    <div id="carContainer" class="max-w-7xl mx-auto py-12 px-4 grid grid-cols-1 md:grid-cols-3 gap-8">
        </div>

    <script src="inventory.js"></script>
    <script>
        const container = document.getElementById('carContainer');

        function renderCars(carList) {
            container.innerHTML = carList.map(car => `
                <div class="bg-white shadow-xl border border-gray-200 flex flex-col">
                    <img src="${car.image}" class="w-full h-56 object-cover">
                    <div class="p-6 flex-grow text-center">
                        <h4 class="text-2xl font-bold text-blue-800 uppercase">${car.year} ${car.make} ${car.model}</h4>
                        <p class="text-gray-500 font-bold italic">${car.trim}</p>
                        <p class="text-gray-600">${car.mileage.toLocaleString()} Miles</p>
                        <div class="my-4 inline-block bg-gray-100 px-6 py-2 font-black text-3xl text-gray-900 border-b-4 border-blue-800">
                            $${car.price.toLocaleString()}
                        </div>
                        <p class="text-red-600 font-black text-sm uppercase">Cash Only</p>
                    </div>
                    <a href="tel:2707365700" class="bg-blue-800 text-white py-4 font-bold text-center uppercase tracking-widest">Call for Details</a>
                </div>
            `).join('');
        }

        function filterAndSort() {
            let filtered = [...cars];
            const search = document.getElementById('searchBox').value.toLowerCase();
            const sort = document.getElementById('priceSort').value;
            const maxMiles = document.getElementById('mileFilter').value;

            // Search Filter
            if(search) filtered = filtered.filter(c => (c.make + c.model).toLowerCase().includes(search));
            
            // Mileage Filter
            if(maxMiles !== 'all') filtered = filtered.filter(c => c.mileage <= parseInt(maxMiles));

            // Sorting
            if(sort === 'low') filtered.sort((a,b) => a.price - b.price);
            if(sort === 'high') filtered.sort((a,b) => b.price - a.price);

            renderCars(filtered);
        }

        // Listen for changes
        document.getElementById('searchBox').addEventListener('input', filterAndSort);
        document.getElementById('priceSort').addEventListener('change', filterAndSort);
        document.getElementById('mileFilter').addEventListener('change', filterAndSort);

        // First load
        renderCars(cars);
    </script>
</body>
</html>
