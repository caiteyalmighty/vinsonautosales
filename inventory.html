<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory | Vinson Auto Sales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .brand-font { font-family: 'Playfair Display', serif; }
        .vinson-blue { color: #003399; }
        .vinson-bg-blue { background-color: #003399; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <nav class="bg-white border-b-4 border-blue-800 p-4 sticky top-0 z-50 shadow-md">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-center md:text-left">
                <h1 class="brand-font text-2xl vinson-blue uppercase leading-none">Vinson Auto Sales</h1>
                <p class="text-xs font-bold text-gray-500 uppercase tracking-widest mt-1">Sacramento, KY</p>
            </div>
            
            <div class="flex flex-wrap justify-center gap-3">
                <input type="text" id="searchBox" placeholder="Search (Make, Model...)" 
                       class="border-2 border-gray-300 p-2 rounded focus:border-blue-800 outline-none w-64">
                
                <select id="priceSort" class="border-2 border-gray-300 p-2 rounded focus:border-blue-800 outline-none">
                    <option value="default">Sort by Price</option>
                    <option value="low">Price: Low to High</option>
                    <option value="high">Price: High to Low</option>
                </select>

                <select id="mileFilter" class="border-2 border-gray-300 p-2 rounded focus:border-blue-800 outline-none">
                    <option value="all">Any Mileage</option>
                    <option value="100000">Under 100k Miles</option>
                    <option value="150000">Under 150k Miles</option>
                </select>

                <a href="index.html" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-4 py-2 rounded font-bold uppercase text-sm flex items-center">
                    ← Home
                </a>
            </div>
        </div>
    </nav>

    <div id="carContainer" class="max-w-7xl mx-auto py-12 px-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        </div>

    <div id="noResults" class="hidden text-center py-20">
        <h3 class="text-2xl font-bold text-gray-400 uppercase">No vehicles match your search.</h3>
        <button onclick="window.location.reload()" class="mt-4 text-blue-800 underline font-bold">Clear all filters</button>
    </div>

    <script src="inventory.js"></script>
    <script>
        const container = document.getElementById('carContainer');
        const noResults = document.getElementById('noResults');

        function renderCars(carList) {
            if (carList.length === 0) {
                container.innerHTML = '';
                noResults.classList.remove('hidden');
                return;
            }
            
            noResults.classList.add('hidden');
            container.innerHTML = carList.map(car => `
                <div class="bg-white shadow-xl border border-gray-200 flex flex-col transform transition hover:scale-[1.02]">
                    <div class="relative">
                        <img src="${car.image}" class="w-full h-64 object-cover" alt="${car.year} ${car.make}">
                        <div class="absolute top-0 right-0 bg-red-600 text-white px-3 py-1 font-black text-xs uppercase tracking-widest">
                            Cash Only
                        </div>
                    </div>
                    <div class="p-6 flex-grow text-center">
                        <h4 class="text-2xl font-bold text-blue-800 uppercase leading-tight">${car.year} ${car.make} ${car.model}</h4>
                        <p class="text-gray-500 font-bold italic mt-1">${car.trim}</p>
                        <p class="text-gray-600 mt-2 font-semibold tracking-tighter">${car.mileage.toLocaleString()} Miles</p>
                        
                        <div class="my-4 inline-block bg-gray-100 px-6 py-2 font-black text-3xl text-gray-900 border-b-4 border-blue-800">
                            $${car.price.toLocaleString()}
                        </div>
                    </div>
                    <a href="tel:2707365700" class="vinson-bg-blue text-white py-4 font-bold text-center uppercase tracking-widest hover:bg-blue-900 transition">
                        Call (270) 736-5700
                    </a>
                </div>
            `).join('');
        }

        function filterAndSort() {
            if (typeof cars === 'undefined') {
                console.error("The 'cars' list was not found in inventory.js");
                return;
            }

            let filtered = [...cars];
            const search = document.getElementById('searchBox').value.toLowerCase();
            const sort = document.getElementById('priceSort').value;
            const maxMiles = document.getElementById('mileFilter').value;

            // 1. Search Logic
            if(search) {
                filtered = filtered.filter(c => 
                    (c.make + " " + c.model + " " + c.year).toLowerCase().includes(search)
                );
            }
            
            // 2. Mileage Logic
            if(maxMiles !== 'all') {
                filtered = filtered.filter(c => c.mileage <= parseInt(maxMiles));
            }

            // 3. Sorting Logic
            if(sort === 'low') filtered.sort((a,b) => a.price - b.price);
            if(sort === 'high') filtered.sort((a,b) => b.price - a.price);

            renderCars(filtered);
        }

        // Event Listeners
        document.getElementById('searchBox').addEventListener('input', filterAndSort);
        document.getElementById('priceSort').addEventListener('change', filterAndSort);
        document.getElementById('mileFilter').addEventListener('change', filterAndSort);

        // Run on Page Load
        window.onload = () => {
            if (typeof cars !== 'undefined') {
                renderCars(cars);
            } else {
                container.innerHTML = '<p class="text-center col-span-full text-red-600 font-bold">Error: inventory.js not found. Check your GitHub file list.</p>';
            }
        };
    </script>
</body>
</html>
